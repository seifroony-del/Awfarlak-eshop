<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتالوج المنتجات الذكي</title>
    <!-- خط القاهرة من جوجل -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- مكتبة الأيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة قراءة ملفات الإكسيل XLSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --neon-blue: #00d2ff;
            --neon-orange: #ff6b4a;
            --card-bg: #1f2937;
            --border-color: #374151;
        }

        .light-theme {
            --bg-primary: #f3f4f6;
            --bg-secondary: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --neon-blue: #0088cc;
            --neon-orange: #e65100;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
        }

        header {
            background-color: var(--bg-secondary);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .controls-panel {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            width: 100%;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 250px;
        }

        .search-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        select {
            padding: 12px 15px;
            flex: 0 1 200px;
            cursor: pointer;
        }

        .btn-action {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-action:hover {
            opacity: 0.9;
        }

        .contact-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .contact-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            text-decoration: none;
            background: var(--bg-secondary);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
        }

        /* شبكة الكتالوج */
        #catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* تصميم الكارت الديناميكي */
        .dynamic-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .image-canvas {
            position: relative;
            width: 100%;
            padding-top: 75%; /* نسبة 4:3 */
            background-color: #000;
        }

        .slider-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .slider-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .slider-slide.active {
            opacity: 1;
            display: flex;
        }

        .slider-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 10px 12px;
            cursor: pointer;
            z-index: 2;
            border-radius: 4px;
        }

        .slider-arrow.prev { right: 10px; }
        .slider-arrow.next { left: 10px; }

        .slider-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            z-index: 2;
        }

        .slider-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .slider-dot.active {
            background: var(--neon-blue);
        }

        .category-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            color: var(--neon-blue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--neon-blue);
            z-index: 3;
        }

        .card-details {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .card-details h3 {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
        }

        .product-code {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .box-info {
            font-size: 13px;
            color: var(--neon-blue);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-pricing {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }

        .price-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .price-tag {
            font-size: 22px;
            font-weight: 700;
            color: var(--neon-orange);
        }

        .currency {
            font-size: 12px;
            margin-right: 4px;
        }

        .neon-order-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
        }

        /* نافذة التحكم الإداري (Modal) */
        .admin-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 999;
        }

        .admin-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 450px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input[type="text"], 
        .form-group input[type="password"] {
            padding: 12px;
        }

        .skeleton-loader {
            text-align: center;
            padding: 4px 12px;
            font-size: 16px;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h2>📌 كتالوج المنتجات الذكي</h2>
            <div style="display: flex; gap: 10px;">
                <button id="theme-toggle" class="btn-action" onclick="toggleThemeMode()">
                    <i class="fas fa-moon"></i> <span>الوضع الداكن</span>
                </button>
                <button class="btn-action" onclick="openAdminGateway()">
                    <i class="fas fa-lock"></i> لوحة التحكم
                </button>
            </div>
        </div>
        
        <div class="controls-panel">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="catalogSearchInput" placeholder="ابحث باسم المنتج أو الكود..." oninput="triggerLiveSearchFilter()">
            </div>
            
            <select id="categorySelectorDropdown" onchange="triggerLiveSearchFilter()">
                <option value="ALL">عرض كل التصنيفات</option>
            </select>
        </div>
    </header>

    <div class="contact-bar">
        <a id="staticPhoneLabel" href="#" class="contact-link"><i class="fas fa-phone"></i>--</a>
        <a id="staticWhatsAppLink" href="#" target="_blank" class="contact-link" style="color: #25d366; border-color: #25d366;">
            <i class="fab fa-whatsapp"></i> راسلنا عبر واتساب
        </a>
    </div>

    <!-- حاوية شبكة العرض الرئيسية -->
    <main id="catalog-container">
        <div class="skeleton-loader">جاري تحميل المنتجات ومزامنتها...</div>
    </main>

    <!-- نافذة الإدارة -->
    <div id="adminAuthWindow" class="admin-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeAdminGateway()">✕</button>
            
            <!-- نموذج تسجيل الدخول -->
            <div id="loginFormSection">
                <h3 style="margin-bottom: 20px;">🔒 تسجيل دخول المشرف</h3>
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="adminUserField" placeholder="أدخل اسم المستخدم">
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="adminPasswordField" placeholder="أدخل كلمة المرور">
                </div>
                <button class="btn-action" style="width: 100%; justify-content: center; background: var(--neon-blue); color: #fff;" onclick="validateAdminCredentials()">تسجيل الدخول</button>
            </div>

            <!-- لوحة التحكم بالرفع (مخفية وتظهر بعد النجاح) -->
            <div id="adminActionSection" style="display: none;">
                <h3 style="margin-bottom: 20px;">🚀 رفع وتحديث البيانات</h3>
                <div class="form-group">
                    <label>اختر ملف الإكسيل الجديد (.xlsx):</label>
                    <input type="file" id="excelFileField" accept=".xlsx, .xls" onchange="handleExcelFileUpload(event)" style="width:100%; padding:10px; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:8px; color:var(--text-primary);">
                </div>
                <div id="uploadStatusMessage" style="margin-top: 15px; font-size: 14px; font-weight: 600; text-align: center;"></div>
            </div>
        </div>
    </div>

    <script>
        const sheetWebUrl = "https://script.google.com/macros/s/AKfycby8PaW4rTRez_rd4HM8HsqkPGlUOO22FbFRtubDf4tBdovHb5m7SEJJnnT1a8CQeeS7NA/exec";
        const phoneNumber = "201202999612"; 
        let localProductsMasterArray = []; 

        // تشغيل جلب البيانات فور تحميل الصفحة
        window.addEventListener('DOMContentLoaded', fetchAndRenderCatalog);

        function toggleThemeMode() {
            const body = document.body;
            const btn = document.getElementById('theme-toggle');
            body.classList.toggle('light-theme');
            btn.innerHTML = body.classList.contains('light-theme') ? 
                `<i class="fas fa-sun"></i> <span>الوضع المضيء</span>` : 
                `<i class="fas fa-moon"></i> <span>الوضع الداكن</span>`;
        }

        function moveSlide(cardIdx, direction, event) {
            if (event) { event.stopPropagation(); event.preventDefault(); }
            const card = document.getElementById(`card-${cardIdx}`);
            if (!card) return;
            let currentSlide = parseInt(card.getAttribute('data-current-slide')) || 0;
            const totalSlides = parseInt(card.getAttribute('data-total-slides')) || 1;
            currentSlide = (currentSlide + direction + totalSlides) % totalSlides;
            setSlide(cardIdx, currentSlide);
        }

        function setSlide(cardIdx, slideIdx, event) {
            if (event) { event.stopPropagation(); event.preventDefault(); }
            const card = document.getElementById(`card-${cardIdx}`);
            if (!card) return;
            card.setAttribute('data-current-slide', slideIdx);
            const slides = card.querySelectorAll('.slider-slide');
            slides.forEach((slide, idx) => {
                if (idx === slideIdx) slide.classList.add('active');
                else slide.classList.remove('active');
            });
            const dots = card.querySelectorAll('.slider-dot');
            dots.forEach((dot, idx) => {
                if (idx === slideIdx) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        async function fetchAndRenderCatalog() {
            const container = document.getElementById('catalog-container');
            try {
                const cleanNum = phoneNumber.startsWith('2') ? phoneNumber.substring(2) : phoneNumber;
                document.getElementById('staticPhoneLabel').innerText = cleanNum;
                document.getElementById('staticPhoneLabel').href = "tel:" + cleanNum;
                document.getElementById('staticWhatsAppLink').href = "https://wa.me/" + phoneNumber;

                const response = await fetch(`${sheetWebUrl}?t=${Date.now()}`);
                localProductsMasterArray = await response.json();
                
                if (!localProductsMasterArray || localProductsMasterArray.length === 0) {
                    container.innerHTML = '<div class="skeleton-loader">لم نجد أي منتجات معروضة حالياً في شيت جوجل.</div>';
                    return;
                }
                
                const categorySelector = document.getElementById('categorySelectorDropdown');
                const categories = new Set();
                localProductsMasterArray.forEach(p => {
                    const cat = p['التصنيف'] || p.category;
                    if(cat) categories.add(cat);
                });
                
                categorySelector.innerHTML = '<option value="ALL">عرض كل التصنيفات</option>';
                categories.forEach(cat => {
                    categorySelector.innerHTML += `<option value="${cat}">${cat}</option>`;
                });

                renderCatalogGrid(localProductsMasterArray);

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="skeleton-loader" style="color: var(--neon-orange);">تحقق من اتصال السيرفر أو رابط الـ Web App.</div>';
            }
        }

        function renderCatalogGrid(productsList) {
            const container = document.getElementById('catalog-container');
            container.innerHTML = ''; 

            productsList.forEach((product, pIndex) => {
                const title = product['اسم المنتج'] || product.title || 'منتج بدون اسم';
                const price = product['سعر القطعة'] || product.price || '0';
                const code = product['كود المنتج'] || product.code || '';
                const category = product['التصنيف'] || product.category || 'عام';
                const boxQty = product['الكمية داخل الكرتونة'] || '';

                let imagesArray = [];
                
                Object.keys(product).forEach(key => {
                    const val = product[key];
                    const keyStr = String(key).toLowerCase();
                    
                    if (
                        keyStr.includes('صورة') || 
                        keyStr.includes('صوره') || 
                        keyStr.includes('image') || 
                        keyStr.includes('pic') || 
                        (typeof val === 'string' && val.trim().startsWith('http'))
                    ) {
                        if (val && typeof val === 'string' && val.trim() !== '') {
                            imagesArray.push(val.trim());
                        }
                    }
                });

                imagesArray = [...new Set(imagesArray)];
                
                if (imagesArray.length === 0) {
                    imagesArray.push('https://via.placeholder.com/400x300/161925/ffffff?text=No+Image');
                }

                const whatsappMessage = `مرحباً، أريد طلب هذا المنتج :\n\n📦 المنتج: ${title}\n🔢 الكود: ${code || 'N/A'}\n💰 السعر: ${price} EGP`;
                const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(whatsappMessage)}`;
                
                let slidesHTML = '';
                imagesArray.forEach((img, imgIdx) => {
                    slidesHTML += `<div class="slider-slide ${imgIdx === 0 ? 'active' : ''}"><img src="${img}" alt="${title}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/161925/ffffff?text=Error+Loading'"></div>`;
                });

                let controlsHTML = '';
                let dotsHTML = '';
                if (imagesArray.length > 1) {
                    controlsHTML = `
                        <button class="slider-arrow prev" onclick="moveSlide(${pIndex}, -1, event)">❮</button>
                        <button class="slider-arrow next" onclick="moveSlide(${pIndex}, 1, event)">❯</button>
                    `;
                    dotsHTML = `<div class="slider-dots">`;
                    imagesArray.forEach((_, imgIdx) => {
                        dotsHTML += `<span class="slider-dot ${imgIdx === 0 ? 'active' : ''}" onclick="setSlide(${pIndex}, ${imgIdx}, event)"></span>`;
                    });
                    dotsHTML += `</div>`;
                }

                const cardHTML = `
                    <div class="dynamic-card" id="card-${pIndex}" data-current-slide="0" data-total-slides="${imagesArray.length}">
                        <div class="image-canvas">
                            <div class="slider-wrapper" id="slider-wrapper-${pIndex}">
                                ${slidesHTML}
                            </div>
                            ${controlsHTML}
                            ${dotsHTML}
                        </div>
                        <span class="category-badge">${category}</span>
                        <div class="card-details">
                            <h3>${title}</h3>
                            ${code ? `<div class="product-code">كود: ${code}</div>` : ''}
                            ${boxQty ? `<div class="box-info"><i class="fas fa-box-open"></i> الكرتونة تحتوي على: ${boxQty} قطعة</div>` : ''}
                            <div class="meta-pricing">
                                <span class="price-label">سعر القطعة</span>
                                <div class="price-tag">${price}<span class="currency">EGP</span></div>
                            </div>
                            <a href="${whatsappUrl}" target="_blank" class="neon-order-btn">
                                <i class="fab fa-whatsapp fa-lg"></i> إرسال طلب الشراء
                            </a>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        function triggerLiveSearchFilter() {
            const searchQuery = document.getElementById('catalogSearchInput').value.toLowerCase().trim();
            const selectedCategory = document.getElementById('categorySelectorDropdown').value;

            const filteredResults = localProductsMasterArray.filter(product => {
                const title = (product['اسم المنتج'] || product.title || '').toLowerCase();
                const code = (product['كود المنتج'] || product.code || '').toLowerCase();
                const cat = product['التصنيف'] || product.category || 'عام';

                const matchesSearch = title.includes(searchQuery) || code.includes(searchQuery);
                const matchesCategory = (selectedCategory === 'ALL') || (cat === selectedCategory);

                return matchesSearch && matchesCategory;
            });

            renderCatalogGrid(filteredResults);
        }

        function openAdminGateway() { document.getElementById('adminAuthWindow').classList.add('active'); }
        function closeAdminGateway() { document.getElementById('adminAuthWindow').classList.remove('active'); }

        async function validateAdminCredentials() {
            const user = document.getElementById('adminUserField').value;
            const pass = document.getElementById('adminPasswordField').value;
            if(!user || !pass) { alert("برجاء إدخال اسم المستخدم وكلمة المرور أولاً!"); return; }

            try {
                const response = await fetch(sheetWebUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'loginVerification', username: user, password: pass })
                });
                
                const responseText = await response.text();
                console.log("Server Login Response:", responseText); 
                
                if (responseText.includes("success") || responseText.includes("true")) {
                    document.getElementById('loginFormSection').style.display = 'none';
                    document.getElementById('adminActionSection').style.display = 'block';
                } else {
                    alert("اسم المستخدم أو كلمة المرور غير صحيحة!");
                }
            } catch (error) {
                console.error(error);
                alert("حدث خطأ أثناء الاتصال بالخادم!");
            }
        }

        async function handleExcelFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const statusMsg = document.getElementById('uploadStatusMessage');
            statusMsg.style.color = 'var(--text-primary)';
            statusMsg.innerText = "جاري قراءة ملف الإكسيل...";

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);

                    if (jsonData.length === 0) {
                        statusMsg.style.color = '#e74c3c';
                        statusMsg.innerText = "الملف فارغ أو يحتوي على تنسيق غير صحيح!";
                        return;
                    }

                    statusMsg.innerText = "جاري إرسال وتحديث البيانات في شيت جوجل...";

                    const response = await fetch(sheetWebUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'updateData', products: jsonData })
                    });

                    const resultText = await response.text();
                    if (resultText.includes("success")) {
                        statusMsg.style.color = '#2ecc71';
                        statusMsg.innerText = "🎉 تم تحديث شيت جوجل بنجاح! جاري تحديث الكتالوج...";
                        setTimeout(() => { location.reload(); }, 2000);
                    } else {
                        statusMsg.style.color = '#e74c3c';
                        statusMsg.innerText = "فشل التحديث: " + resultText;
                    }

                } catch (err) {
                    console.error(err);
                    statusMsg.style.color = '#e74c3c';
                    statusMsg.innerText = "حدث خطأ غير متوقع أثناء معالجة الملف.";
                }
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
